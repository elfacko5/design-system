name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Prerequisites before this workflow can actually publish anything:
#   1. Remove (or set to false) "private": true in package.json.
#   2. Add an NPM_TOKEN secret to this repo (Settings → Secrets and
#      variables → Actions) with "Automation" publish rights on npmjs.com.
#   3. Confirm the "name" field in package.json is the real, available
#      package name you want to publish under.
#
# Until all three are done, this workflow will run build/typecheck/test
# on tag push but fail (intentionally) at the publish step.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build tokens (tokens/ → dist/)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build component library
        run: npm run build:lib

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
